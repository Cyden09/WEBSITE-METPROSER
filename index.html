<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metproser</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9A84C;
  --dark: #0a0a0a;
  --dark2: #111111;
  --white: #ffffff;
  --w60: rgba(255,255,255,0.6);
  --w10: rgba(255,255,255,0.08);
  --nav-h: 80px;
  --sb-w: 320px;
  --ease: 0.6s cubic-bezier(0.76, 0, 0.24, 1);
}
html, body { height: 100%; background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

/* NAVBAR */
#navbar {
  position: fixed; inset: 0 0 auto 0; height: var(--nav-h); z-index: 100;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 0 32px; transition: background 0.4s;
}
#navbar.scrolled { background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); }
#navbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}
.hamburger {
  display: flex; flex-direction: column; gap: 6px;
  width: 44px; height: 44px; padding: 10px;
  background: none; border: none; cursor: pointer;
}
.hamburger span {
  display: block; height: 1px; background: var(--white);
  transition: transform var(--ease), opacity 0.3s, width 0.3s;
}
.hamburger span:nth-child(1) { width: 24px; }
.hamburger span:nth-child(2) { width: 16px; }
.hamburger span:nth-child(3) { width: 24px; }
.hamburger:hover span { background: var(--gold); }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); width: 24px; }
.nav-logo { display: flex; align-items: center; justify-content: center; text-decoration: none; }
.logo-img  { height: 72px; width: auto; mix-blend-mode: lighten; transition: transform 0.3s; }
.nav-logo:hover .logo-img { transform: scale(1.05); }
.nav-right { display: flex; justify-content: flex-end; }
.btn-contact {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--white); background: none; border: 1px solid rgba(255,255,255,0.45);
  padding: 10px 22px; text-decoration: none; transition: border-color 0.3s, color 0.3s;
}
.btn-contact:hover { border-color: var(--gold); color: var(--gold); }

/* OVERLAY */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity var(--ease);
}
#overlay.open { opacity: 1; pointer-events: all; }

/* SIDEBAR — grid de 3 filas */
#sidebar {
  position: fixed; top: 0; left: 0;
  width: var(--sb-w); height: 100vh;
  background: var(--dark2); z-index: 300;
  transform: translateX(-100%); transition: transform var(--ease);
  display: grid;
  grid-template-rows: var(--nav-h) 1fr auto;
}
#sidebar.open { transform: translateX(0); }
#sidebar::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, transparent, var(--gold) 50%, transparent);
  opacity: 0.35; pointer-events: none;
}

/* Fila 1 */
.sb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; border-bottom: 1px solid var(--w10);
}
.sb-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); }
.sb-close { background: none; border: none; cursor: pointer; color: var(--w60); font-size: 18px; padding: 8px; transition: color 0.2s; }
.sb-close:hover { color: var(--white); }

/* Fila 2 — links centrados verticalmente */
.sb-nav {
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 40px;
}
.nav-link {
  display: block; padding: 20px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; font-weight: 300; letter-spacing: 1px;
  color: var(--w60); text-decoration: none;
  border-bottom: 1px solid var(--w10);
  transition: color 0.3s; position: relative;
}
.nav-link:last-child { border-bottom: none; }
.nav-link:hover { color: var(--white); }
.nav-link::after {
  content: ''; position: absolute; bottom: 0; left: -40px;
  width: 0; height: 1px; background: var(--gold); transition: width 0.45s;
}
.nav-link:hover::after { width: calc(100% + 40px); }
.link-num {
  display: block; font-family: 'Montserrat', sans-serif;
  font-size: 9px; color: var(--gold); letter-spacing: 2px; margin-bottom: 2px;
}

/* Fila 3 — footer */
.sb-footer { padding: 24px 40px; border-top: 1px solid var(--w10); }
.sb-footer-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--w60); margin-bottom: 10px; }
.sb-socials { display: flex; gap: 20px; }
.sb-socials a { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--w60); text-decoration: none; transition: color 0.2s; }
.sb-socials a:hover { color: var(--gold); }

/* HERO */
.hero {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding-top: var(--nav-h); position: relative;
}
.hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 50% 55%, rgba(201,168,76,0.05) 0%, transparent 70%);
}
.hero-eyebrow { font-size: 9px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); margin-bottom: 28px; opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px,10vw,100px); font-weight: 300; letter-spacing: clamp(8px,2vw,20px); text-transform: uppercase; margin-bottom: 28px; opacity: 0; animation: fadeUp 1s ease 0.5s forwards; }
.hero-line { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 24px; opacity: 0; animation: fadeIn 1s ease 0.7s forwards; }
.hero-tagline { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--w60); margin-bottom: 72px; opacity: 0; animation: fadeUp 1s ease 0.9s forwards; }
.hero-tagline span { color: var(--gold); margin: 0 10px; }
.hero-discover { display: flex; flex-direction: column; align-items: center; gap: 10px; opacity: 0; animation: fadeIn 1s ease 1.2s forwards; }
.discover-label { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--w60); }
.discover-bar { width: 1px; height: 48px; background: linear-gradient(to bottom, var(--w60), transparent); animation: pulse 2s ease 1.5s infinite; }

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes pulse   { 0%,100% { opacity:.3; transform:scaleY(.6); } 50% { opacity:1; transform:scaleY(1); } }
</style>
</head>
<body>

<nav id="navbar">
  <div>
    <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </div>
  <a class="nav-logo" href="#">
    <img class="logo-img" src="images/logo.png" alt="Metproser">
  </a>
  <div class="nav-right">
    <a class="btn-contact" href="#">Contáctanos</a>
  </div>
</nav>

<div id="overlay"></div>

<aside id="sidebar">
  <div class="sb-header">
    <span class="sb-label">Menú</span>
    <button class="sb-close" id="closeBtn">&#x2715;</button>
  </div>
  <nav class="sb-nav">
    <a class="nav-link" href="#"><span class="link-num">01</span>Home</a>
    <a class="nav-link" href="#"><span class="link-num">02</span>Nosotros</a>
    <a class="nav-link" href="#"><span class="link-num">03</span>Servicios</a>
    <a class="nav-link" href="#"><span class="link-num">04</span>Proyectos</a>
    <a class="nav-link" href="#"><span class="link-num">05</span>Contacto</a>
  </nav>
  <div class="sb-footer">
    <p class="sb-footer-label">Síguenos</p>
    <div class="sb-socials">
      <a href="#">Instagram</a>
      <a href="#">LinkedIn</a>
      <a href="#">Facebook</a>
    </div>
  </div>
</aside>

<section class="hero">
  <p class="hero-eyebrow">Bienvenido</p>
  <h1 class="hero-title">Metproser</h1>
  <div class="hero-line"></div>
  <p class="hero-tagline">Innovación <span>·</span> Calidad <span>·</span> Confianza</p>
  <div class="hero-discover">
    <span class="discover-label">Descubrir</span>
    <div class="discover-bar"></div>
  </div>
</section>

<script>
  const btn=document.getElementById('hamburger'),
        sb=document.getElementById('sidebar'),
        ov=document.getElementById('overlay'),
        cl=document.getElementById('closeBtn'),
        nb=document.getElementById('navbar');
  function openSB(){ btn.classList.add('open'); sb.classList.add('open'); ov.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeSB(){ btn.classList.remove('open'); sb.classList.remove('open'); ov.classList.remove('open'); document.body.style.overflow=''; }
  btn.addEventListener('click', ()=> sb.classList.contains('open') ? closeSB() : openSB());
  cl.addEventListener('click', closeSB);
  ov.addEventListener('click', closeSB);
  document.addEventListener('keydown', e=> e.key==='Escape' && closeSB());
  window.addEventListener('scroll', ()=> nb.classList.toggle('scrolled', scrollY>20));
</script>
</body>
</html>
