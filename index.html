<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metproser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E2C47A;
    --dark: #0a0a0a;
    --dark-2: #111111;
    --white: #ffffff;
    --white-60: rgba(255,255,255,0.6);
    --white-20: rgba(255,255,255,0.2);
    --sidebar-w: 320px;
    --nav-h: 80px;
    --transition: 0.6s cubic-bezier(0.76, 0, 0.24, 1);
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: var(--nav-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 32px;
    transition: background 0.4s ease;
  }

  nav::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--white-20), transparent);
  }

  nav.scrolled {
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
  }

  /* Hamburger */
  .nav-left { display: flex; align-items: center; }

  .hamburger {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    width: 44px; height: 44px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  .hamburger span {
    display: block;
    width: 28px; height: 1px;
    background: var(--white);
    transition: transform var(--transition), opacity 0.3s ease, width 0.3s ease;
    transform-origin: center;
  }

  .hamburger span:nth-child(2) { width: 20px; }

  .hamburger:hover span { background: var(--gold); }

  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); width: 28px; }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Logo centro */
  .nav-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-decoration: none;
  }

  .logo-img {
    height: 90px;
    width: auto;
    display: block;
    transition: opacity 0.3s ease, transform 0.3s ease;
    /* El logo tiene fondo negro — mix-blend-mode lo hace transparente */
    mix-blend-mode: lighten;
  }

  .nav-logo:hover .logo-img {
    opacity: 0.85;
    transform: scale(1.04);
  }

  /* Botón derecho */
  .nav-right { display: flex; justify-content: flex-end; }

  .btn-contact {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white);
    background: none;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 10px 22px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
  }

  .btn-contact:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    backdrop-filter: blur(3px);
  }

  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--dark-2);
    z-index: 300;
    transform: translateX(-100%);
    transition: transform var(--transition);
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .sidebar.open { transform: translateX(0); }

  /* Línea dorada decorativa */
  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: var(--nav-h);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
  }

  .sidebar-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--white-60);
    font-size: 20px;
    line-height: 1;
    padding: 8px;
    transition: color 0.2s;
    font-weight: 200;
  }

  .sidebar-close:hover { color: var(--white); }

  /* Nav links */
  .sidebar-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 40px;
    gap: 4px;
  }

  .nav-link {
    position: relative;
    display: block;
    padding: 16px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--white-60);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.3s ease;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    overflow: visible;
  }

  .nav-link:last-child { border-bottom: none; }

  .nav-link::before {
    content: '';
    position: absolute;
    left: -40px; bottom: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.5s ease;
  }

  .nav-link:hover { color: var(--white); }
  .nav-link:hover::before { width: calc(100% + 40px); }

  .nav-link .link-number {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    display: block;
    margin-bottom: 4px;
    font-weight: 300;
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 28px 40px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .footer-label {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white-60);
    margin-bottom: 12px;
    font-weight: 400;
  }

  .social-links {
    display: flex;
    gap: 20px;
  }

  .social-links a {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-60);
    text-decoration: none;
    transition: color 0.2s;
  }

  .social-links a:hover { color: var(--gold); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: var(--nav-h) 24px 0;
    background: var(--dark);
  }

  /* Fondo con patrón sutil */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 60%, rgba(201,168,76,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 30% 30%, rgba(255,255,255,0.02) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-size: 9px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 10vw, 100px);
    font-weight: 300;
    letter-spacing: clamp(8px, 2vw, 20px);
    text-transform: uppercase;
    line-height: 1;
    color: var(--white);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .hero-divider {
    width: 40px; height: 1px;
    background: var(--gold);
    margin: 0 auto 24px;
    opacity: 0;
    animation: fadeIn 1s ease 0.7s forwards;
  }

  .hero-tagline {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--white-60);
    font-weight: 300;
    margin-bottom: 72px;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }

  .hero-tagline span {
    color: var(--gold);
    margin: 0 12px;
  }

  .hero-discover {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
    cursor: pointer;
  }

  .discover-text {
    font-size: 9px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--white-60);
    font-weight: 400;
  }

  .discover-line {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, var(--white-60), transparent);
    animation: lineGrow 2s ease 1.5s infinite;
  }

  @keyframes lineGrow {
    0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
    50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
    51% { transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-left">
    <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <a class="nav-logo" href="#">
    <img class="logo-img" src="images/logo.png" alt="Metproser">
  </a>

  <div class="nav-right">
    <a class="btn-contact" href="#">Contáctanos</a>
  </div>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <span class="sidebar-label">Menú</span>
    <button class="sidebar-close" id="closeBtn">&#x2715;</button>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-link" href="#">
      <span class="link-number">01</span>
      Home
    </a>
    <a class="nav-link" href="#">
      <span class="link-number">02</span>
      Nosotros
    </a>
    <a class="nav-link" href="#">
      <span class="link-number">03</span>
      Servicios
    </a>
    <a class="nav-link" href="#">
      <span class="link-number">04</span>
      Proyectos
    </a>
    <a class="nav-link" href="#">
      <span class="link-number">05</span>
      Contacto
    </a>
  </nav>

  <div class="sidebar-footer">
    <p class="footer-label">Síguenos</p>
    <div class="social-links">
      <a href="#">Instagram</a>
      <a href="#">LinkedIn</a>
      <a href="#">Facebook</a>
    </div>
  </div>
</aside>

<!-- HERO -->
<section class="hero">
  <p class="hero-eyebrow">Bienvenido</p>
  <h1 class="hero-title">Metproser</h1>
  <div class="hero-divider"></div>
  <p class="hero-tagline">
    Innovación <span>·</span> Calidad <span>·</span> Confianza
  </p>
  <div class="hero-discover">
    <span class="discover-text">Descubrir</span>
    <div class="discover-line"></div>
  </div>
</section>

<script>
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');
  const overlay   = document.getElementById('overlay');
  const closeBtn  = document.getElementById('closeBtn');
  const navbar    = document.getElementById('navbar');

  function openMenu() {
    hamburger.classList.add('open');
    sidebar.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    hamburger.classList.remove('open');
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  hamburger.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeMenu() : openMenu();
  });

  closeBtn.addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMenu();
  });

  // Navbar scroll
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 20);
  });
</script>

</body>
</html>
